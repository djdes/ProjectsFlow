<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS Safari игнорирует maximum-scale/user-scalable для accessibility (с iOS 10+) —
         не полагаемся на них. Защита от авто-зума при фокусе в input реализована через
         font-size: 16px на input/textarea в @media (max-width: 639px) в globals.css. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ProjectsFlow</title>

    <!-- PWA: установка на экран «Домой». Минимальный набор (manifest + meta), без service worker. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="application-name" content="ProjectsFlow" />
    <meta name="apple-mobile-web-app-title" content="ProjectsFlow" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <script>
      // FOUC fix: применяем тему ДО React, чтобы не мерцать светлым на загрузке тёмной.
      (function () {
        try {
          var t = localStorage.getItem('pf-theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.add(dark ? 'dark' : 'light');
        } catch (_) {
          /* localStorage недоступен — ничего страшного, останется light */
        }
      })();
      // То же для анимаций — иначе первый кадр диалога/меню успеет анимироваться
      // до монтирования MotionProvider.
      (function () {
        try {
          var m = localStorage.getItem('pf-motion');
          var off =
            m === 'off' ||
            (m === null && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
          if (off) document.documentElement.classList.add('pf-no-motion');
        } catch (_) {
          /* localStorage недоступен */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
